---
# CIRISManager Handlers

- name: Reload systemd
  ansible.builtin.systemd:
    daemon_reload: true

- name: Restart ciris-manager
  ansible.builtin.systemd:
    name: "{{ manager_service_name }}"
    state: restarted

- name: Restart nginx
  ansible.builtin.systemd:
    name: nginx
    state: restarted
