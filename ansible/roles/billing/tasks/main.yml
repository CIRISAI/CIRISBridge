# Deploy CIRISBilling
# Lifecycle: backup → deploy → migrate → smoke test → (rollback on failure)
---

# =============================================================================
# PRE-DEPLOY: Backup current state for rollback
# =============================================================================
- name: Get current billing image digest (for rollback)
  ansible.builtin.shell: |
    docker inspect ciris-billing --format '{{ '{{' }}.Image{{ '}}' }}' 2>/dev/null || echo "none"
  register: current_image
  changed_when: false
  failed_when: false

- name: Save rollback info
  ansible.builtin.copy:
    content: |
      # Billing rollback info - {{ ansible_date_time.iso8601 }}
      PREVIOUS_IMAGE={{ current_image.stdout }}
      DEPLOY_TIME={{ ansible_date_time.iso8601 }}
    dest: /opt/ciris/billing/.rollback_info
    mode: "0600"
  when: current_image.stdout != "none"

# =============================================================================
# DEPLOY: Update configuration and pull new image
# =============================================================================
- name: Copy Billing docker-compose
  ansible.builtin.template:
    src: docker-compose.yml.j2
    dest: /opt/ciris/billing/docker-compose.yml
    mode: "0644"

- name: Copy Billing environment file
  ansible.builtin.template:
    src: env.j2
    dest: /opt/ciris/billing/.env
    mode: "0600"
  notify: Restart Billing

- name: Create Billing log directory
  ansible.builtin.file:
    path: /var/log/ciris/billing
    state: directory
    mode: "0755"

- name: Start Billing service
  community.docker.docker_compose_v2:
    project_src: /opt/ciris/billing
    state: present
    pull: always
  register: billing_deploy

# =============================================================================
# HEALTH CHECK: Wait for service to be ready
# =============================================================================
- name: Wait for Billing to be ready
  ansible.builtin.uri:
    # Production uses host networking (port 8000), test uses bridge networking (billing_port)
    url: "http://localhost:{{ (ciris_environment | default('production') == 'test') | ternary(billing_port, '8000') }}/health"
    status_code: 200
  register: health_result
  retries: 15
  delay: 5
  until: health_result.status == 200

# =============================================================================
# MIGRATE: Run database migrations (US node or test environment)
# =============================================================================
- name: Run database migrations (US node or test environment)
  community.docker.docker_container_exec:
    container: ciris-billing
    command: alembic upgrade head
  when: node_name == "us" or ciris_environment | default('production') == "test"
  register: migration_result

# =============================================================================
# RECONCILE SPOCK REPLICATION SET: ensure every public table is in 'default'.
# Why this exists: alembic migrations create tables via raw DDL, but Spock 5.x
# does not auto-add new tables to a replication set. Without this, DML on a
# new table only persists locally and never propagates to the peer node — see
# 2026-05-01 incident with admin_oauth_sessions/stripe_payment_intents.
# Idempotent: repset_add_table is a no-op when the table is already in the set.
# =============================================================================
- name: "RECONCILE: add any public tables missing from Spock 'default' repset"
  ansible.builtin.shell: |
    docker exec -i -e PGPASSWORD='{{ billing_db_password }}' ciris-billing-spock \
      /opt/pgedge/pg15/bin/psql -p 5433 -U billing -d ciris_billing -tAc "
    DO \$reconcile\$
    DECLARE r record;
    BEGIN
      FOR r IN
        SELECT t.tablename
        FROM pg_tables t
        LEFT JOIN spock.tables s
          ON s.nspname = t.schemaname
         AND s.relname  = t.tablename
         AND s.set_name = 'default'
        WHERE t.schemaname = 'public'
          AND s.relname IS NULL
      LOOP
        PERFORM spock.repset_add_table('default','public.'||quote_ident(r.tablename), true);
        RAISE NOTICE 'spock_repset: added public.% to default', r.tablename;
      END LOOP;
    END\$reconcile\$;"
  register: spock_reconcile
  changed_when: "'spock_repset: added' in spock_reconcile.stderr"

- name: "RECONCILE: report any tables added"
  ansible.builtin.debug:
    msg: "Spock repset reconciliation: {{ (spock_reconcile.stderr_lines | select('search','spock_repset:') | list) or ['no new tables to add'] }}"

# =============================================================================
# SMOKE TEST: Verify critical flows work
# TODO: Implement after Google OAuth test account is set up
# =============================================================================
- name: "SMOKE TEST: Verify health endpoint returns healthy"
  ansible.builtin.uri:
    # Production uses host networking (port 8000), test uses bridge networking (billing_port)
    url: "http://localhost:{{ (ciris_environment | default('production') == 'test') | ternary(billing_port, '8000') }}/health"
    status_code: 200
    return_content: yes
  register: smoke_health
  failed_when: smoke_health.json.status != 'healthy'

- name: "SMOKE TEST: Verify database connected"
  ansible.builtin.assert:
    that:
      - smoke_health.json.database == 'connected'
    fail_msg: "Database not connected after deploy"

# TODO: Add OAuth-based smoke tests when test account is ready
# - name: "SMOKE TEST: New user signup flow"
# - name: "SMOKE TEST: Credit check for existing user"
# - name: "SMOKE TEST: Charge transaction"

- name: Log successful deployment
  ansible.builtin.debug:
    msg: |
      Billing deployment successful on {{ inventory_hostname }}
      - Health: {{ smoke_health.json.status }}
      - Database: {{ smoke_health.json.database }}
      - Migrations: {{ 'completed' if node_name == 'us' else 'skipped (EU node)' }}
