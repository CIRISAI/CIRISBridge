# CIRISBridge Full Deployment - Active/Active
# Deploys identical services to both nodes
#
# Usage:
#   ansible-playbook playbooks/site.yml
#   ansible-playbook playbooks/site.yml --limit us
#   ansible-playbook playbooks/site.yml --tags "dns,billing"
#
# Both nodes are equal peers - no primary/secondary distinction

---
- name: Common setup for all nodes
  hosts: all
  become: true
  roles:
    - common
  tags: [common]

# DECOMMISSIONED 2026-05-02: Constellation DNS replaced by Reticulum migration.
# Containers stopped on both nodes; data volumes retained at /opt/ciris/dns/.
# Zero traffic to cirisdns at decom time — all CIRIS domains delegate to
# Cloudflare/Hetzner. Role remains on disk under roles/constellation/ for
# reversibility; remove the role + this comment block + UFW 53 rules in
# roles/common/tasks/main.yml after Reticulum is load-bearing.
# - name: Deploy DNS (Constellation with GeoDNS)
#   hosts: all
#   become: true
#   roles:
#     - constellation
#   tags: [dns]

# DECOMMISSIONED 2026-05-02: legacy ciris-postgres on port 5432 superseded by Spock
# (ciris-billing-spock on 5433, multi-master). Containers stopped, data volumes
# retained at /opt/ciris/postgres/data on each node. Final dumps preserved at
# /data/backups/legacy-postgres-decom/ciris_billing_legacy_{us,eu}_20260502_*.sql.
# Restore: `cd /opt/ciris/postgres && docker compose start` if needed.
# Remove this play (and /opt/ciris/postgres) entirely after a 30-day soak.
# - name: Deploy PostgreSQL (bi-directional replication)
#   hosts: all
#   become: true
#   roles:
#     - postgres
#   tags: [postgres]

- name: Deploy Caddy (TLS termination)
  hosts: all
  become: true
  roles:
    - caddy
  tags: [caddy]

- name: Deploy CIRISBilling
  hosts: all
  become: true
  roles:
    - billing
  tags: [billing]

- name: Deploy CIRISProxy
  hosts: all
  become: true
  roles:
    - proxy
  tags: [proxy]

- name: Deploy CIRISLens (US node only - centralized observability)
  hosts: all
  become: true
  roles:
    - lens
  tags: [lens]

- name: Deploy Scheduler (systemd timers for health checks)
  hosts: all
  become: true
  roles:
    - scheduler
  tags: [scheduler]

