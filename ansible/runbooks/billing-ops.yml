---
# Billing Operations Runbook
# Common database queries for billing troubleshooting + 24h status reports
#
# Connects to ciris-billing-spock (port 5433, billing user, pgEdge Spock multi-master).
# The legacy ciris-postgres (port 5432, postgres user) was decommissioned 2026-05-02
# in the Spock cutover.
#
# Usage:
#   # Quick status — full 24h report (new users, LLM telemetry, models, hourly, top users)
#   ansible-playbook -i inventory/production.yml runbooks/billing-ops.yml --tags status \
#     --vault-password-file ~/.vault_pass --limit us
#
#   # User lookup
#   ansible-playbook -i inventory/production.yml runbooks/billing-ops.yml --tags lookup \
#     -e "external_id=10942" --vault-password-file ~/.vault_pass --limit us
#   ansible-playbook -i inventory/production.yml runbooks/billing-ops.yml --tags lookup \
#     -e "email=user@example.com" --vault-password-file ~/.vault_pass --limit us
#
#   # User usage history
#   ansible-playbook -i inventory/production.yml runbooks/billing-ops.yml --tags usage \
#     -e "external_id=10942" --vault-password-file ~/.vault_pass --limit us
#
#   # User tool credits
#   ansible-playbook -i inventory/production.yml runbooks/billing-ops.yml --tags tools \
#     -e "external_id=10942" --vault-password-file ~/.vault_pass --limit us
#
#   # Recent transactions
#   ansible-playbook -i inventory/production.yml runbooks/billing-ops.yml --tags transactions \
#     -e "limit=20" --vault-password-file ~/.vault_pass --limit us
#
#   # Full system stats (accounts, 7d LLM, tool usage)
#   ansible-playbook -i inventory/production.yml runbooks/billing-ops.yml --tags stats \
#     --vault-password-file ~/.vault_pass --limit us
#
# Note: --limit us is recommended since Spock is multi-master and US/EU return
# identical data within sub-second replication lag. Querying both nodes just
# doubles the output.

- name: "BILLING OPS - Quick Status (24h report)"
  hosts: all
  gather_facts: false
  tags: [status]
  vars:
    psql: "docker exec -e PGPASSWORD={{ billing_db_password }} ciris-billing-spock /opt/pgedge/pg15/bin/psql -p 5433 -U billing -d ciris_billing"

  tasks:
    - name: "STATUS: New accounts (24h, by oauth_provider)"
      ansible.builtin.shell: |
        {{ psql }} -c "
          SELECT
            COUNT(*) AS new_accounts_24h,
            COUNT(*) FILTER (WHERE oauth_provider = 'oauth:google') AS via_google,
            COUNT(*) FILTER (WHERE oauth_provider = 'oauth:apple')  AS via_apple,
            COUNT(*) FILTER (WHERE oauth_provider LIKE 'oauth:test%') AS via_test
          FROM accounts
          WHERE created_at > NOW() - INTERVAL '24 hours';
        "
      register: new_accounts
      changed_when: false
      ignore_errors: true

    - name: "STATUS: LLM usage telemetry (24h)"
      ansible.builtin.shell: |
        {{ psql }} -c "
          SELECT
            COUNT(*) AS interactions,
            COUNT(DISTINCT account_id) AS active_users,
            SUM(total_llm_calls) AS llm_calls,
            SUM(total_prompt_tokens) AS prompt_tokens,
            SUM(total_completion_tokens) AS completion_tokens,
            SUM(error_count) AS errors,
            SUM(fallback_count) AS fallbacks
          FROM llm_usage_logs
          WHERE created_at > NOW() - INTERVAL '24 hours';
        "
      register: llm_telemetry
      changed_when: false
      ignore_errors: true

    - name: "STATUS: Charges (24h)"
      ansible.builtin.shell: |
        {{ psql }} -c "
          SELECT
            COUNT(*) AS charge_count,
            COUNT(DISTINCT account_id) AS unique_users,
            ROUND(SUM(amount_minor)::numeric / 100, 2) AS total_usd
          FROM charges
          WHERE created_at > NOW() - INTERVAL '24 hours';
        "
      register: charges
      changed_when: false
      ignore_errors: true

    - name: "STATUS: Model usage histogram (24h)"
      ansible.builtin.shell: |
        {{ psql }} -c "
          SELECT
            unnest(models_used) AS model,
            COUNT(*) AS interactions
          FROM llm_usage_logs
          WHERE created_at > NOW() - INTERVAL '24 hours'
          GROUP BY model
          ORDER BY interactions DESC;
        "
      register: model_histogram
      changed_when: false
      ignore_errors: true

    - name: "STATUS: Hourly distribution (24h, UTC)"
      ansible.builtin.shell: |
        {{ psql }} -c "
          SELECT
            date_trunc('hour', created_at) AS hour_utc,
            COUNT(*) AS interactions,
            SUM(total_llm_calls) AS llm_calls,
            COUNT(DISTINCT account_id) AS users
          FROM llm_usage_logs
          WHERE created_at > NOW() - INTERVAL '24 hours'
          GROUP BY 1 ORDER BY 1;
        "
      register: hourly
      changed_when: false
      ignore_errors: true

    - name: "STATUS: Top users (24h, by interaction count)"
      ansible.builtin.shell: |
        {{ psql }} -c "
          SELECT
            substring(account_id::text, 1, 8) AS account_prefix,
            COUNT(*) AS interactions,
            SUM(total_llm_calls) AS llm_calls,
            SUM(total_prompt_tokens) AS prompt_tokens,
            ROUND(AVG(duration_ms)::numeric, 0) AS avg_ms
          FROM llm_usage_logs
          WHERE created_at > NOW() - INTERVAL '24 hours'
          GROUP BY account_id
          ORDER BY interactions DESC
          LIMIT 10;
        "
      register: top_users
      changed_when: false
      ignore_errors: true

    - name: "STATUS: 7-day daily activity"
      ansible.builtin.shell: |
        {{ psql }} -c "
          SELECT
            DATE(created_at) AS day,
            COUNT(*) AS charges,
            COUNT(DISTINCT account_id) AS users,
            ROUND(SUM(amount_minor)::numeric / 100, 2) AS total_usd
          FROM charges
          WHERE created_at > NOW() - INTERVAL '7 days'
          GROUP BY DATE(created_at)
          ORDER BY day DESC;
        "
      register: daily_7d
      changed_when: false
      ignore_errors: true

    - name: "STATUS: Account totals (lifetime)"
      ansible.builtin.shell: |
        {{ psql }} -c "
          SELECT
            COUNT(*) AS total_accounts,
            COUNT(*) FILTER (WHERE status = 'active') AS active_accounts,
            COUNT(*) FILTER (WHERE total_uses > 0) AS accounts_with_usage
          FROM accounts;
        "
      register: account_totals
      changed_when: false
      ignore_errors: true

    - name: "STATUS: Container health"
      ansible.builtin.shell: |
        docker ps --format '{{ '{{' }}.Names{{ '}}' }}: {{ '{{' }}.Status{{ '}}' }}' | sort
      register: container_health
      changed_when: false
      ignore_errors: true

    - name: "STATUS: System resources"
      ansible.builtin.shell: |
        echo "Load: $(uptime | awk -F'load average:' '{print $2}')"
        echo "Memory: $(free -m | awk '/^Mem:/ {printf "%dM / %dM (%d%%)", $3, $2, int($3/$2*100)}')"
        echo "Disk: $(df -h / | awk 'NR==2 {print $3 " / " $2 " (" $5 ")"}')"
      register: system_resources
      changed_when: false
      ignore_errors: true

    - name: "STATUS: Display report"
      ansible.builtin.debug:
        msg: |
          ================================================================
          {{ inventory_hostname | upper }} — BILLING/PROXY 24h REPORT
          ================================================================

          === System resources ===
          {{ system_resources.stdout | default('(unavailable)') }}

          === Container health ===
          {{ container_health.stdout | default('(unavailable)') }}

          === New accounts (24h) ===
          {{ new_accounts.stdout | default('(unavailable)') }}

          === LLM usage telemetry (24h) ===
          {{ llm_telemetry.stdout | default('(unavailable)') }}

          === Charges (24h) ===
          {{ charges.stdout | default('(unavailable)') }}

          === Model usage (24h) ===
          {{ model_histogram.stdout | default('(unavailable)') }}

          === Hourly distribution (24h, UTC) ===
          {{ hourly.stdout | default('(unavailable)') }}

          === Top users (24h) ===
          {{ top_users.stdout | default('(unavailable)') }}

          === 7-day daily activity ===
          {{ daily_7d.stdout | default('(unavailable)') }}

          === Account totals (lifetime) ===
          {{ account_totals.stdout | default('(unavailable)') }}

- name: "BILLING OPS - User Lookup"
  hosts: vultr
  gather_facts: false
  tags: [lookup, never]
  vars:
    external_id: ""
    email: ""
    psql: "docker exec -e PGPASSWORD={{ billing_db_password }} ciris-billing-spock /opt/pgedge/pg15/bin/psql -p 5433 -U billing -d ciris_billing"

  tasks:
    - name: "LOOKUP: Find user by external_id"
      ansible.builtin.shell: |
        {{ psql }} -c "
          SELECT
            id, external_id, customer_email, display_name,
            balance_minor, free_uses_remaining, paid_credits,
            daily_free_uses_remaining, total_uses, status, created_at
          FROM accounts
          WHERE external_id LIKE '{{ external_id }}%'
          ORDER BY created_at DESC
          LIMIT 10;
        "
      register: user_result
      changed_when: false
      when: external_id | length > 0

    - name: "LOOKUP: Find user by email"
      ansible.builtin.shell: |
        {{ psql }} -c "
          SELECT
            id, external_id, customer_email, display_name,
            balance_minor, free_uses_remaining, paid_credits,
            daily_free_uses_remaining, total_uses, status, created_at
          FROM accounts
          WHERE customer_email ILIKE '%{{ email }}%'
          ORDER BY created_at DESC
          LIMIT 10;
        "
      register: email_result
      changed_when: false
      when: email | length > 0

    - name: "LOOKUP: Display results"
      ansible.builtin.debug:
        msg: "{{ user_result.stdout | default(email_result.stdout) | default('No search criteria provided. Use -e external_id=X or -e email=X') }}"

- name: "BILLING OPS - Usage History"
  hosts: vultr
  gather_facts: false
  tags: [usage, never]
  vars:
    external_id: ""
    limit: 20
    psql: "docker exec -e PGPASSWORD={{ billing_db_password }} ciris-billing-spock /opt/pgedge/pg15/bin/psql -p 5433 -U billing -d ciris_billing"

  tasks:
    - name: Validate external_id
      ansible.builtin.fail:
        msg: "Specify external_id: -e 'external_id=10942'"
      when: external_id | length == 0

    - name: "USAGE: Get LLM usage logs"
      ansible.builtin.shell: |
        {{ psql }} -c "
          SELECT
            l.id, l.models_used,
            l.total_prompt_tokens AS input_tokens,
            l.total_completion_tokens AS output_tokens,
            l.actual_cost_cents, l.duration_ms, l.created_at
          FROM llm_usage_logs l
          JOIN accounts a ON l.account_id = a.id
          WHERE a.external_id LIKE '{{ external_id }}%'
          ORDER BY l.created_at DESC
          LIMIT {{ limit }};
        "
      register: usage_result
      changed_when: false

    - name: "USAGE: Display results"
      ansible.builtin.debug:
        msg: "{{ usage_result.stdout }}"

- name: "BILLING OPS - Tool Credits"
  hosts: vultr
  gather_facts: false
  tags: [tools, never]
  vars:
    external_id: ""
    psql: "docker exec -e PGPASSWORD={{ billing_db_password }} ciris-billing-spock /opt/pgedge/pg15/bin/psql -p 5433 -U billing -d ciris_billing"

  tasks:
    - name: Validate external_id
      ansible.builtin.fail:
        msg: "Specify external_id: -e 'external_id=10942'"
      when: external_id | length == 0

    - name: "TOOLS: Get product inventory"
      ansible.builtin.shell: |
        {{ psql }} -c "
          SELECT
            p.product_type, p.free_remaining, p.paid_credits,
            p.total_uses, p.last_daily_refresh, p.created_at
          FROM product_inventory p
          JOIN accounts a ON p.account_id = a.id
          WHERE a.external_id LIKE '{{ external_id }}%';
        "
      register: inventory_result
      changed_when: false

    - name: "TOOLS: Get recent tool usage"
      ansible.builtin.shell: |
        {{ psql }} -c "
          SELECT
            l.product_type, l.used_free, l.used_paid,
            l.cost_minor, l.created_at
          FROM product_usage_logs l
          JOIN accounts a ON l.account_id = a.id
          WHERE a.external_id LIKE '{{ external_id }}%'
          ORDER BY l.created_at DESC
          LIMIT 20;
        "
      register: tool_usage_result
      changed_when: false

    - name: "TOOLS: Display results"
      ansible.builtin.debug:
        msg: |
          === Product Inventory ===
          {{ inventory_result.stdout }}

          === Recent Tool Usage ===
          {{ tool_usage_result.stdout }}

- name: "BILLING OPS - Recent Transactions"
  hosts: vultr
  gather_facts: false
  tags: [transactions, never]
  vars:
    limit: 20
    psql: "docker exec -e PGPASSWORD={{ billing_db_password }} ciris-billing-spock /opt/pgedge/pg15/bin/psql -p 5433 -U billing -d ciris_billing"

  tasks:
    # Note: charges has no `status` column in the Spock-era schema. Removed from select.
    - name: "TRANSACTIONS: Get recent charges"
      ansible.builtin.shell: |
        {{ psql }} -c "
          SELECT
            c.id, a.external_id, a.customer_email,
            c.amount_minor, c.currency, c.description, c.created_at
          FROM charges c
          JOIN accounts a ON c.account_id = a.id
          ORDER BY c.created_at DESC
          LIMIT {{ limit }};
        "
      register: charges_result
      changed_when: false

    - name: "TRANSACTIONS: Display results"
      ansible.builtin.debug:
        msg: "{{ charges_result.stdout }}"

- name: "BILLING OPS - System Stats (full)"
  hosts: vultr
  gather_facts: false
  tags: [stats, never]
  vars:
    psql: "docker exec -e PGPASSWORD={{ billing_db_password }} ciris-billing-spock /opt/pgedge/pg15/bin/psql -p 5433 -U billing -d ciris_billing"

  tasks:
    - name: "STATS: Account statistics (lifetime)"
      ansible.builtin.shell: |
        {{ psql }} -c "
          SELECT
            COUNT(*) AS total_accounts,
            COUNT(*) FILTER (WHERE status = 'active') AS active_accounts,
            COUNT(*) FILTER (WHERE total_uses > 0) AS accounts_with_usage,
            SUM(total_uses) AS total_llm_uses,
            SUM(balance_minor) AS total_balance_minor,
            SUM(paid_credits) AS total_paid_credits
          FROM accounts;
        "
      register: account_stats
      changed_when: false

    - name: "STATS: Charges (24h)"
      ansible.builtin.shell: |
        {{ psql }} -c "
          SELECT
            COUNT(*) AS charges_24h,
            COUNT(DISTINCT account_id) AS unique_users_24h,
            SUM(amount_minor) AS total_amount_minor_24h
          FROM charges
          WHERE created_at > NOW() - INTERVAL '24 hours';
        "
      register: usage_stats
      changed_when: false

    - name: "STATS: LLM usage (7d)"
      ansible.builtin.shell: |
        {{ psql }} -c "
          SELECT
            COUNT(*) AS llm_requests_7d,
            COUNT(DISTINCT account_id) AS unique_users_7d,
            SUM(total_prompt_tokens + total_completion_tokens) AS total_tokens_7d,
            SUM(actual_cost_cents) AS total_cost_cents_7d
          FROM llm_usage_logs
          WHERE created_at > NOW() - INTERVAL '7 days';
        "
      register: llm_stats
      changed_when: false

    - name: "STATS: Tool usage by product"
      ansible.builtin.shell: |
        {{ psql }} -c "
          SELECT
            product_type,
            COUNT(*) AS total_uses,
            COUNT(*) FILTER (WHERE used_free) AS free_uses,
            COUNT(*) FILTER (WHERE used_paid) AS paid_uses
          FROM product_usage_logs
          GROUP BY product_type;
        "
      register: tool_stats
      changed_when: false

    - name: "STATS: Display results"
      ansible.builtin.debug:
        msg: |
          === Account Statistics (lifetime) ===
          {{ account_stats.stdout }}

          === Charges (24h) ===
          {{ usage_stats.stdout }}

          === LLM Usage (7d) ===
          {{ llm_stats.stdout }}

          === Tool Usage by Product ===
          {{ tool_stats.stdout }}
