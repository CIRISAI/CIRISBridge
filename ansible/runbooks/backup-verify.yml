---
# PostgreSQL Backup Verification Runbook (Spock Edition)
# Validates backup health, replication, and recovery capability against the
# active billing path (ciris-billing-spock on port 5433, billing user).
#
# HISTORY:
#   This runbook used to read native logical-replication state from the legacy
#   ciris-postgres (port 5432, postgres user). After the Spock cutover (billing
#   moved to pgEdge multi-master on 5433), the legacy publications/subscriptions
#   went idle and their slots accumulated retained WAL nobody consumes. The
#   runbook kept reading legacy state and reported false-alarm "replication
#   broken" for ~3 weeks. As of 2026-05-01 it points at Spock.
#
# WHERE THINGS LIVE NOW:
#   - ciris-billing connects to 127.0.0.1:5433 (Spock container)
#   - Spock subscriptions: spock.sub_show_status()
#   - Active replication slots: pg_replication_slots WHERE slot_name LIKE 'spk_%'
#   - Replication-set membership: spock.tables
#   - Legacy ciris-postgres on 5432 is orphaned (last write 2026-04-13)
#
# Usage:
#   ansible-playbook -i inventory/production.yml runbooks/backup-verify.yml --tags status
#   ansible-playbook -i inventory/production.yml runbooks/backup-verify.yml --tags test-dump
#   ansible-playbook -i inventory/production.yml runbooks/backup-verify.yml --tags test-restore
#   ansible-playbook -i inventory/production.yml runbooks/backup-verify.yml --tags wal-check
#   ansible-playbook -i inventory/production.yml runbooks/backup-verify.yml --tags full-verify
#   ansible-playbook -i inventory/production.yml runbooks/backup-verify.yml --tags status --limit us

- name: "POSTGRESQL BACKUP VERIFY (Spock) - Database Backup and Replication Health"
  hosts: all
  gather_facts: false
  vars:
    # Test database name (temporary)
    test_restore_db: ciris_billing_restore_test
    # Spock connection
    spock_container: ciris-billing-spock
    spock_psql: /opt/pgedge/pg15/bin/psql
    spock_pg_dump: /opt/pgedge/pg15/bin/pg_dump
    spock_port: 5433
    spock_user: billing
    spock_db: ciris_billing
    # Spock backup dir on host (created by pgedge-postgres role)
    spock_backup_dir: /data/backups/spock-billing
    # Replication thresholds — Spock active slots normally hold KB, alert on MB
    wal_retention_warning_mb: 64
    wal_retention_critical_mb: 256

  tasks:
    # =========================================================================
    # STATUS - Spock subscription health, repset membership, slot retention
    # =========================================================================
    - name: "STATUS: Check Spock backup and replication status"
      tags: [status, always]
      block:
        - name: "STATUS: Gather Spock metrics"
          ansible.builtin.shell: |
            export PGPASSWORD='{{ billing_db_password }}'

            PSQL="docker exec -e PGPASSWORD={{ billing_db_password }} {{ spock_container }} {{ spock_psql }} -p {{ spock_port }} -U {{ spock_user }} -d {{ spock_db }}"

            echo "=== {{ inventory_hostname | upper }} - SPOCK BACKUP & REPLICATION STATUS ==="
            echo "Timestamp: $(date -u '+%Y-%m-%d %H:%M:%S UTC')"
            echo ""

            if ! docker ps --format '{%raw%}{{.Names}}{%endraw%}' | grep -q '^{{ spock_container }}$'; then
              echo "ERROR: {{ spock_container }} not running"
              exit 1
            fi

            echo "--- DATABASE SIZE ---"
            $PSQL -c "
              SELECT datname AS database, pg_size_pretty(pg_database_size(datname)) AS size
              FROM pg_database WHERE datname = '{{ spock_db }}';" 2>/dev/null || echo "Error querying database size"
            echo ""

            echo "--- SPOCK NODE ---"
            $PSQL -c "SELECT node_id, node_name FROM spock.node;" 2>/dev/null || echo "Error querying spock.node"
            echo ""

            echo "--- WAL POSITION ---"
            $PSQL -c "
              SELECT pg_current_wal_lsn() AS current_wal_lsn,
                     pg_walfile_name(pg_current_wal_lsn()) AS current_wal_file;" 2>/dev/null
            echo ""

            echo "--- SPOCK SUBSCRIPTIONS (from peer) ---"
            $PSQL -c "
              SELECT subscription_name, status, slot_name
              FROM spock.sub_show_status();" 2>/dev/null || echo "Error querying spock.sub_show_status"
            echo ""

            echo "--- SPOCK REPLICATION-SET MEMBERSHIP (default repset, public.*) ---"
            $PSQL -c "
              SELECT set_name, COUNT(*) AS table_count
              FROM spock.tables WHERE nspname = 'public'
              GROUP BY set_name ORDER BY set_name;" 2>/dev/null || echo "Error querying spock.tables"
            echo ""

            echo "--- ACTIVE SPOCK REPLICATION SLOTS (slot_name LIKE 'spk_%') ---"
            $PSQL -c "
              SELECT slot_name, slot_type, active,
                     pg_size_pretty(pg_wal_lsn_diff(pg_current_wal_lsn(), restart_lsn)) AS retained_wal,
                     restart_lsn, confirmed_flush_lsn
              FROM pg_replication_slots
              WHERE slot_name LIKE 'spk_%';" 2>/dev/null
            echo ""

            echo "--- ORPHANED LEGACY SLOTS (NOT spk_%; should be empty post-cutover) ---"
            ORPHANS=$($PSQL -t -A -c "
              SELECT COUNT(*) FROM pg_replication_slots
              WHERE slot_name NOT LIKE 'spk_%';" 2>/dev/null | xargs)
            if [ "${ORPHANS:-0}" -gt 0 ]; then
              echo "⚠ ${ORPHANS} non-Spock slot(s) found:"
              $PSQL -c "
                SELECT slot_name, active,
                       pg_size_pretty(pg_wal_lsn_diff(pg_current_wal_lsn(), restart_lsn)) AS retained_wal
                FROM pg_replication_slots WHERE slot_name NOT LIKE 'spk_%';" 2>/dev/null
              echo "  Drop with: SELECT pg_drop_replication_slot('<slot_name>');"
            else
              echo "✓ No orphaned slots"
            fi
            echo ""

            echo "--- TABLE STATISTICS (top 10 by size) ---"
            $PSQL -c "
              SELECT schemaname, relname AS table,
                     pg_size_pretty(pg_total_relation_size(schemaname||'.'||relname)) AS size,
                     n_live_tup AS estimated_rows
              FROM pg_stat_user_tables
              WHERE schemaname = 'public'
              ORDER BY pg_total_relation_size(schemaname||'.'||relname) DESC
              LIMIT 10;" 2>/dev/null || echo "Error querying table stats"
            exit 0
          register: status_check
          changed_when: false
          no_log: false

        - name: "STATUS: Display results"
          ansible.builtin.debug:
            msg: "{{ status_check.stdout }}"

    # =========================================================================
    # TEST-DUMP - Create test pg_dump and verify integrity
    # =========================================================================
    - name: "TEST-DUMP: Create and verify pg_dump backup (Spock)"
      tags: [test-dump, never]
      block:
        - name: "TEST-DUMP: Create backup file"
          ansible.builtin.shell: |
            export PGPASSWORD='{{ billing_db_password }}'
            DOCKER_PGDUMP="docker exec -e PGPASSWORD={{ billing_db_password }} {{ spock_container }} {{ spock_pg_dump }} -p {{ spock_port }} -U {{ spock_user }} -d {{ spock_db }}"
            DOCKER_EXEC="docker exec {{ spock_container }}"

            echo "=== {{ inventory_hostname | upper }} - SPOCK TEST BACKUP ==="
            echo "Timestamp: $(date -u '+%Y-%m-%d %H:%M:%S UTC')"
            echo ""

            mkdir -p {{ spock_backup_dir }}
            TIMESTAMP=$(date -u '+%Y%m%d_%H%M%S')
            CONTAINER_PATH="/data/backups/ciris_billing_${TIMESTAMP}.sql"
            HOST_PATH="{{ spock_backup_dir }}/ciris_billing_${TIMESTAMP}.sql"

            echo "Creating backup: $HOST_PATH"
            START_TIME=$(date +%s)
            if $DOCKER_PGDUMP --verbose --format=plain --no-owner --no-acl \
              --file="$CONTAINER_PATH" 2>&1 | tail -5; then
              END_TIME=$(date +%s)
              DURATION=$((END_TIME - START_TIME))

              if [ ! -f "$HOST_PATH" ]; then
                echo "✗ ERROR: Backup file not visible on host (volume mount issue?)"
                echo "  Expected: $HOST_PATH"
                echo "  Inside container: $CONTAINER_PATH"
                exit 1
              fi

              BACKUP_SIZE=$(stat -c%s "$HOST_PATH")
              BACKUP_SIZE_MB=$((BACKUP_SIZE / 1024 / 1024))
              echo ""
              echo "✓ Backup completed in ${DURATION}s (${BACKUP_SIZE_MB} MB)"
              echo "  Location: $HOST_PATH"
              echo ""

              echo "--- BACKUP FILE VERIFICATION ---"
              if head -1 "$HOST_PATH" | grep -q "PostgreSQL database dump"; then
                echo "✓ Valid dump header"
              else
                echo "✗ ERROR: Invalid dump header"; exit 1
              fi
              if tail -1 "$HOST_PATH" | grep -q "PostgreSQL database dump complete"; then
                echo "✓ Dump completion marker found"
              else
                echo "✗ WARNING: Dump may be incomplete"
              fi

              TABLE_COUNT=$(grep -c "^CREATE TABLE" "$HOST_PATH" || true)
              INDEX_COUNT=$(grep -c "^CREATE.*INDEX" "$HOST_PATH" || true)
              echo "  Tables: $TABLE_COUNT  Indexes: $INDEX_COUNT"
              echo ""

              echo "--- CHECKSUM ---"
              CHECKSUM=$(sha256sum "$HOST_PATH" | awk '{print $1}')
              echo "$CHECKSUM" > "${HOST_PATH}.sha256"
              echo "SHA256: $CHECKSUM"
              echo ""

              echo "--- RECENT BACKUPS ---"
              ls -lh {{ spock_backup_dir }}/ciris_billing_*.sql 2>/dev/null | tail -10
            else
              echo "✗ ERROR: pg_dump failed"
              exit 1
            fi
          register: test_dump
          changed_when: false

        - name: "TEST-DUMP: Display results"
          ansible.builtin.debug:
            msg: "{{ test_dump.stdout }}"

    # =========================================================================
    # TEST-RESTORE - Restore to temporary database and verify
    # =========================================================================
    - name: "TEST-RESTORE: Restore backup to test database (Spock)"
      tags: [test-restore, never]
      block:
        - name: "TEST-RESTORE: Find latest backup and restore"
          ansible.builtin.shell: |
            export PGPASSWORD='{{ billing_db_password }}'
            PSQL="docker exec -e PGPASSWORD={{ billing_db_password }} {{ spock_container }} {{ spock_psql }} -p {{ spock_port }} -U {{ spock_user }}"

            echo "=== {{ inventory_hostname | upper }} - SPOCK TEST RESTORE ==="
            echo "Timestamp: $(date -u '+%Y-%m-%d %H:%M:%S UTC')"
            echo ""

            LATEST_BACKUP=$(ls -t {{ spock_backup_dir }}/ciris_billing_*.sql 2>/dev/null | head -1)
            if [ -z "$LATEST_BACKUP" ]; then
              echo "✗ ERROR: No backups found in {{ spock_backup_dir }}. Run --tags test-dump first."
              exit 1
            fi
            echo "Using backup: $LATEST_BACKUP"
            BACKUP_SIZE_MB=$(($(stat -c%s "$LATEST_BACKUP") / 1024 / 1024))
            echo "Backup size: ${BACKUP_SIZE_MB} MB"
            echo ""

            if [ -f "${LATEST_BACKUP}.sha256" ]; then
              echo "--- CHECKSUM VERIFICATION ---"
              EXPECTED=$(cat "${LATEST_BACKUP}.sha256")
              ACTUAL=$(sha256sum "$LATEST_BACKUP" | awk '{print $1}')
              if [ "$EXPECTED" = "$ACTUAL" ]; then
                echo "✓ Checksum verified: $ACTUAL"
              else
                echo "✗ ERROR: Checksum mismatch"; exit 1
              fi
              echo ""
            fi

            # Restore inside the spock container — file lives in mounted /data/backups
            CONTAINER_BACKUP="/data/backups/$(basename "$LATEST_BACKUP")"

            echo "Cleaning up any previous test database..."
            $PSQL -d postgres -c "DROP DATABASE IF EXISTS {{ test_restore_db }};" 2>&1 | grep -v "does not exist" || true
            echo "Creating test database: {{ test_restore_db }}"
            $PSQL -d postgres -c "CREATE DATABASE {{ test_restore_db }};" >/dev/null
            echo ""

            echo "--- RESTORING BACKUP ---"
            START_TIME=$(date +%s)
            if $PSQL -d {{ test_restore_db }} -f "$CONTAINER_BACKUP" 2>&1 | tail -10; then
              DURATION=$(( $(date +%s) - START_TIME ))
              echo ""
              echo "✓ Restore completed in ${DURATION}s"
            else
              echo "✗ ERROR: Restore failed"; exit 1
            fi
            echo ""

            echo "--- RESTORATION VERIFICATION ---"
            TABLE_COUNT=$($PSQL -d {{ test_restore_db }} -t -c "
              SELECT COUNT(*) FROM information_schema.tables
              WHERE table_schema = 'public';" | xargs)
            echo "✓ Tables restored: $TABLE_COUNT"
            echo ""
            echo "Top 5 tables by row count:"
            $PSQL -d {{ test_restore_db }} -c "
              SELECT schemaname, tablename, n_live_tup AS rows
              FROM pg_stat_user_tables
              ORDER BY n_live_tup DESC LIMIT 5;" 2>/dev/null
            echo ""

            FK_COUNT=$($PSQL -d {{ test_restore_db }} -t -c "
              SELECT COUNT(*) FROM information_schema.table_constraints
              WHERE constraint_type = 'FOREIGN KEY';" | xargs)
            echo "✓ Foreign key constraints: $FK_COUNT"
            echo ""

            echo "--- CLEANUP ---"
            $PSQL -d postgres -c "DROP DATABASE {{ test_restore_db }};" >/dev/null || echo "Note: cleanup failed"
            echo "✓ Test restore completed successfully"
          register: test_restore
          changed_when: false

        - name: "TEST-RESTORE: Display results"
          ansible.builtin.debug:
            msg: "{{ test_restore.stdout }}"

    # =========================================================================
    # WAL-CHECK - Verify Spock replication health between nodes
    # =========================================================================
    - name: "WAL-CHECK: Verify Spock replication health"
      tags: [wal-check, never]
      block:
        - name: "WAL-CHECK: Check subscription status and slot retention"
          ansible.builtin.shell: |
            export PGPASSWORD='{{ billing_db_password }}'
            PSQL="docker exec -e PGPASSWORD={{ billing_db_password }} {{ spock_container }} {{ spock_psql }} -p {{ spock_port }} -U {{ spock_user }} -d {{ spock_db }}"

            echo "=== {{ inventory_hostname | upper }} - SPOCK REPLICATION HEALTH ==="
            echo "Timestamp: $(date -u '+%Y-%m-%d %H:%M:%S UTC')"
            echo ""

            ALERTS=""

            if ! docker ps --format '{%raw%}{{.Names}}{%endraw%}' | grep -q '^{{ spock_container }}$'; then
              echo "✗ ERROR: {{ spock_container }} not running"
              exit 1
            fi

            echo "--- WAL POSITION ---"
            $PSQL -c "SELECT pg_current_wal_lsn() AS current_lsn, pg_walfile_name(pg_current_wal_lsn()) AS wal_file;" 2>/dev/null
            echo ""

            echo "--- SPOCK SUBSCRIPTION STATUS ---"
            SUBS=$($PSQL -t -A -F '|' -c "
              SELECT subscription_name, status, slot_name FROM spock.sub_show_status();" 2>/dev/null)
            if [ -z "$SUBS" ]; then
              echo "⚠ WARNING: No Spock subscriptions found"
              ALERTS="${ALERTS}WARNING: No Spock subscriptions on this node\n"
            else
              echo "$SUBS" | while IFS='|' read -r SUB STATE SLOT; do
                [ -z "$SUB" ] && continue
                echo "Subscription: $SUB"
                echo "  Status: $STATE"
                echo "  Slot:   $SLOT"
                if [ "$STATE" != "replicating" ]; then
                  ALERTS="${ALERTS}CRITICAL: Spock subscription $SUB is '$STATE' (expected 'replicating')\n"
                fi
              done
            fi
            echo ""

            echo "--- ACTIVE SPOCK SLOTS (retained WAL) ---"
            SLOT_INFO=$($PSQL -t -A -F '|' -c "
              SELECT slot_name, active::text,
                     (pg_wal_lsn_diff(pg_current_wal_lsn(), restart_lsn) / (1024*1024))::int AS retained_mb
              FROM pg_replication_slots
              WHERE slot_name LIKE 'spk_%';" 2>/dev/null)
            if [ -z "$SLOT_INFO" ]; then
              echo "⚠ WARNING: No Spock slots (slot_name LIKE 'spk_%') found"
              ALERTS="${ALERTS}WARNING: No Spock slots\n"
            else
              echo "$SLOT_INFO" | while IFS='|' read -r SLOT ACTIVE RETAINED; do
                [ -z "$SLOT" ] && continue
                echo "Slot: $SLOT"
                echo "  Active: $ACTIVE"
                echo "  Retained: ${RETAINED:-0} MB"
                if [ "$ACTIVE" != "t" ]; then
                  ALERTS="${ALERTS}CRITICAL: Spock slot $SLOT is INACTIVE (peer may be down)\n"
                fi
                if [ -n "$RETAINED" ] && [ "$RETAINED" -gt {{ wal_retention_critical_mb }} ] 2>/dev/null; then
                  ALERTS="${ALERTS}CRITICAL: Slot $SLOT has ${RETAINED}MB retained (threshold: {{ wal_retention_critical_mb }}MB)\n"
                elif [ -n "$RETAINED" ] && [ "$RETAINED" -gt {{ wal_retention_warning_mb }} ] 2>/dev/null; then
                  ALERTS="${ALERTS}WARNING: Slot $SLOT has ${RETAINED}MB retained (threshold: {{ wal_retention_warning_mb }}MB)\n"
                fi
              done
            fi
            echo ""

            echo "--- ORPHANED NON-SPOCK SLOTS ---"
            ORPHANS=$($PSQL -t -A -F '|' -c "
              SELECT slot_name, active::text,
                     (pg_wal_lsn_diff(pg_current_wal_lsn(), restart_lsn) / (1024*1024))::int AS retained_mb
              FROM pg_replication_slots
              WHERE slot_name NOT LIKE 'spk_%';" 2>/dev/null)
            if [ -z "$ORPHANS" ]; then
              echo "✓ No orphaned non-Spock slots"
            else
              echo "$ORPHANS" | while IFS='|' read -r SLOT ACTIVE RETAINED; do
                [ -z "$SLOT" ] && continue
                echo "⚠ Orphan: $SLOT  active=$ACTIVE  retained=${RETAINED:-0}MB"
                ALERTS="${ALERTS}WARNING: Orphan slot $SLOT (drop with pg_drop_replication_slot)\n"
              done
            fi
            echo ""

            echo "--- WAL SENDER PROCESSES ---"
            WAL_SENDERS=$($PSQL -t -c "SELECT COUNT(*) FROM pg_stat_replication;" | xargs)
            if [ "${WAL_SENDERS:-0}" -gt 0 ]; then
              echo "✓ Active WAL senders: $WAL_SENDERS"
              $PSQL -c "
                SELECT application_name, client_addr, state, sync_state,
                       pg_wal_lsn_diff(pg_current_wal_lsn(), sent_lsn) / 1024 AS send_lag_kb
                FROM pg_stat_replication;" 2>/dev/null
            else
              echo "⚠ No active WAL senders"
              ALERTS="${ALERTS}WARNING: No active WAL senders\n"
            fi
            echo ""

            if [ -n "$ALERTS" ]; then
              echo "=== REPLICATION HEALTH ALERTS ==="
              echo -e "$ALERTS"
              exit 1
            else
              echo "✓ All Spock replication health checks passed"
            fi
          register: wal_check
          changed_when: false
          failed_when: wal_check.rc != 0

        - name: "WAL-CHECK: Display results"
          ansible.builtin.debug:
            msg: "{{ wal_check.stdout }}"

    # =========================================================================
    # FULL-VERIFY - Run complete verification suite
    # =========================================================================
    - name: "FULL-VERIFY: Complete backup verification"
      tags: [full-verify, never]
      block:
        - name: "FULL-VERIFY: Run all verification steps"
          ansible.builtin.shell: |
            echo "=== {{ inventory_hostname | upper }} - FULL SPOCK BACKUP VERIFICATION ==="
            echo "Timestamp: $(date -u '+%Y-%m-%d %H:%M:%S UTC')"
            echo ""
            echo "Steps: status → test-dump → test-restore → wal-check"
            echo ""
          register: full_verify_header
          changed_when: false

        - name: "FULL-VERIFY: Display header"
          ansible.builtin.debug:
            msg: "{{ full_verify_header.stdout }}"

        - name: Include status check
          ansible.builtin.include_tasks: "{{ playbook_dir }}/runbooks/backup-verify.yml"
          vars:
            ansible_run_tags: [status]

        - name: Include test dump
          ansible.builtin.include_tasks: "{{ playbook_dir }}/runbooks/backup-verify.yml"
          vars:
            ansible_run_tags: [test-dump]

        - name: Include test restore
          ansible.builtin.include_tasks: "{{ playbook_dir }}/runbooks/backup-verify.yml"
          vars:
            ansible_run_tags: [test-restore]

        - name: Include WAL check
          ansible.builtin.include_tasks: "{{ playbook_dir }}/runbooks/backup-verify.yml"
          vars:
            ansible_run_tags: [wal-check]
